<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>야호 테스트</title>

<style>
body{
    font-family:sans-serif;
    background:#ffeef6;
    text-align:center;
    padding:50px;
}

#container{
    max-width:600px;
    margin:auto;
}

button{
    display:block;
    width:100%;
    margin:10px 0;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#ff5b9a;
    color:white;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}
</style>
</head>

<body>

<div id="container">

<h1>당신은 어떤 디저트일까?</h1>

<div id="question-area">

<p>좋아하는 간식은?</p>

<button onclick="showResult('cake')">케이크</button>
<button onclick="showResult('jelly')">젤리</button>
<button onclick="showResult('choco')">초콜릿</button>

</div>

</div>

<script>

function showResult(type){

const area=document.getElementById("question-area");

if(type==="cake"){
    area.innerHTML=`
    <h2>당신은 딸기 케이크 타입!</h2>
    <p>다정하고 부드러운 성격입니다.</p>
    `;
}

if(type==="jelly"){
    area.innerHTML=`
    <h2>당신은 젤리 타입!</h2>
    <p>자유롭고 유쾌한 성격입니다.</p>
    `;
}

if(type==="choco"){
    area.innerHTML=`
    <h2>당신은 초콜릿 타입!</h2>
    <p>겉은 차갑지만 속은 따뜻합니다.</p>
    `;
}

}

</script>

</body>
</html>
